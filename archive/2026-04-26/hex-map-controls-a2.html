<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>UK-AQ Hex Map — Controls A2</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *{box-sizing:border-box;}
    body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#f0ede8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;}
    :root{
      --ink:#101822;--ink-1:#1b2a38;--ink-2:#3a4a5a;--ink-3:#6b7a88;--ink-4:#9aa7b3;
      --line:#e4e6ea;--line-soft:#eef0f3;
      --surface:#ffffff;--surface-2:#fbfaf6;
      --accent:#3C78AC;--accent-deep:#285A84;
    }
    .card{background:var(--surface);border-radius:12px;border:1px solid var(--line);box-shadow:0 2px 20px rgba(16,24,34,0.09);overflow:visible;width:100%;max-width:960px;display:flex;flex-direction:column;font-size:13px;color:var(--ink);}
    .card-head{padding:13px 18px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:12px;}
    .card-head h2{margin:0;font-size:14px;font-weight:600;color:var(--ink-1);flex:1;}
    .sub{font-size:12px;color:var(--ink-3);}

    /* Toolbar */
    .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:8px 14px;border-bottom:1px solid var(--line-soft);background:var(--surface-2);overflow:visible;}
    .toolbar-divider{width:1px;height:20px;background:var(--line);flex-shrink:0;}
    .field-label{font-size:10.5px;letter-spacing:0.05em;text-transform:uppercase;font-weight:600;color:var(--ink-3);white-space:nowrap;}

    /* Segmented */
    .segmented{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:3px;gap:2px;}
    .segmented button{border:0;background:transparent;padding:5px 14px;font-size:12.5px;font-weight:500;color:var(--ink-2);border-radius:6px;cursor:pointer;font-family:inherit;}
    .segmented button.active{background:var(--surface);color:var(--accent-deep);box-shadow:0 1px 3px rgba(16,24,34,0.10);font-weight:600;}

    /* Pollutant pills */
    .pill-group{display:inline-flex;gap:3px;}
    .pill{border:1px solid var(--line);background:var(--surface-2);color:var(--ink-2);font-size:12px;font-weight:500;padding:4px 11px;border-radius:999px;cursor:pointer;font-family:inherit;}
    .pill.active{background:color-mix(in oklab,var(--accent) 12%,white);color:var(--accent-deep);border-color:color-mix(in oklab,var(--accent) 35%,white);font-weight:600;}

    /* Region popover */
    .popover-wrap{position:relative;}
    .popover-trigger{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--surface);padding:5px 10px;border-radius:6px;font-size:12.5px;color:var(--ink-1);font-family:inherit;cursor:pointer;font-weight:500;transition:border-color 0.12s;}
    .popover-trigger.open{border-color:var(--accent);color:var(--accent-deep);}
    .popover-trigger .chevron{transition:transform 0.15s;}
    .popover-trigger.open .chevron{transform:rotate(180deg);}
    .popover-menu{position:absolute;top:calc(100% + 6px);left:0;background:var(--surface);border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 28px rgba(16,24,34,0.14);min-width:210px;padding:6px;z-index:200;}
    .popover-group-head{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;font-weight:700;color:var(--ink-4);padding:7px 10px 3px;}
    .popover-item{padding:6px 10px;border-radius:6px;font-size:12.5px;color:var(--ink-2);cursor:pointer;display:flex;align-items:center;}
    .popover-item:hover{background:var(--surface-2);}
    .popover-item.active{color:var(--accent-deep);font-weight:600;background:color-mix(in oklab,var(--accent) 8%,white);}
    .popover-item.active::after{content:'✓';margin-left:auto;font-size:11px;opacity:0.8;}
    .popover-divider{height:1px;background:var(--line-soft);margin:4px 6px;}

    /* Search pill */
    .search-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.88);border:1px solid rgba(16,24,34,0.12);border-radius:999px;padding:5px 14px;font-size:12.5px;color:var(--ink-3);box-shadow:0 1px 4px rgba(16,24,34,0.08);cursor:text;backdrop-filter:blur(4px);}

    /* Map top bar — overlaid on canvas */
    .map-topbar{position:absolute;top:10px;right:12px;display:flex;align-items:center;gap:7px;z-index:10;}

    /* Status + refresh */
    .status-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-2);padding:4px 10px;border-radius:999px;border:1px solid rgba(16,24,34,0.12);background:rgba(255,255,255,0.88);backdrop-filter:blur(4px);box-shadow:0 1px 4px rgba(16,24,34,0.08);}
    .pulse{width:7px;height:7px;border-radius:50%;background:#35b56a;box-shadow:0 0 0 0 rgba(53,181,106,0.5);animation:pulse 1.8s ease-out infinite;}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(53,181,106,0.5);}80%{box-shadow:0 0 0 7px rgba(53,181,106,0);}100%{box-shadow:0 0 0 0 rgba(53,181,106,0);}}
    .btn-refresh{background:var(--accent);border:1px solid var(--accent);color:#fff;padding:5px 12px;border-radius:6px;font-weight:600;font-size:12.5px;cursor:pointer;font-family:inherit;box-shadow:0 1px 4px rgba(16,24,34,0.12);}

    /* Map body */
    .map-body{display:flex;}
    .map-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;border-radius:0 0 0 12px;}
    .map-aside{width:180px;flex-shrink:0;border-left:1px solid var(--line-soft);padding:13px;background:var(--surface);display:flex;flex-direction:column;gap:11px;border-radius:0 0 12px 0;}

    /* Hex canvas placeholder */
    .hex-canvas{flex:1;min-height:320px;position:relative;display:flex;align-items:center;justify-content:center;color:var(--ink-4);font-size:11.5px;letter-spacing:0.04em;text-transform:uppercase;font-weight:500;background:radial-gradient(ellipse at 38% 38%,color-mix(in oklab,var(--accent) 6%,#fbfaf6) 0%,#fff 75%);}

    /* Legend */
    .legend{display:flex;align-items:center;gap:9px;font-size:11.5px;color:var(--ink-3);padding:8px 14px;border-top:1px solid var(--line-soft);}
    .legend-bar{flex:1;height:8px;border-radius:4px;background:linear-gradient(to right,#00a85a 0%,#8dc63f 18%,#ffd54a 36%,#ff9b3a 54%,#e03c3c 72%,#8b1e3f 86%,#5b2a86 100%);}
    .legend-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--ink-2);}

    /* Aside */
    .aside-label{font-size:10px;letter-spacing:0.07em;text-transform:uppercase;font-weight:600;color:var(--ink-4);margin-bottom:5px;}
    .net-row{display:flex;align-items:center;gap:7px;padding:3px 0;font-size:11.5px;color:var(--ink-2);}
    .net-swatch{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
    .net-count{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-4);}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const COUNTRIES = ['Northern Ireland','Scotland','Wales'];
const ENG_REGIONS = ['East Midlands','East of England','London','North East','North West','South East','South West','West Midlands','Yorkshire and the Humber'];
const POLLS = [['pm25','PM2.5'],['pm10','PM10'],['no2','NO₂']];
const NETS = [{c:'#3C78AC',l:'DEFRA AURN',n:213},{c:'#00a85a',l:'Breathe London',n:412},{c:'#f4b942',l:'OpenAQ',n:389},{c:'#e03c3c',l:'Scottish Comm.',n:142},{c:'#8b1e3f',l:'Sensor.Community',n:128}];

function HexBg() {
  const stops=[[0,'#00a85a'],[0.18,'#8dc63f'],[0.36,'#ffd54a'],[0.54,'#ff9b3a'],[0.72,'#e03c3c'],[0.86,'#8b1e3f'],[1,'#5b2a86']];
  const lerp=(a,b,t)=>a+(b-a)*t;
  const h2r=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  const r2h=r=>'#'+r.map(v=>Math.round(v).toString(16).padStart(2,'0')).join('');
  const ramp=t=>{t=Math.max(0,Math.min(1,t));for(let i=0;i<stops.length-1;i++){const[ta,ca]=stops[i],[tb,cb]=stops[i+1];if(t>=ta&&t<=tb){const k=(t-ta)/(tb-ta);const a=h2r(ca),b=h2r(cb);return r2h([lerp(a[0],b[0],k),lerp(a[1],b[1],k),lerp(a[2],b[2],k)]);}}return stops[stops.length-1][1];};
  const rnd=i=>{const x=Math.sin(i*9301.7+49297.3)*233280;return x-Math.floor(x);};
  const hp=(cx,cy,s)=>{let d='';for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);d+=(i===0?'M':'L')+(cx+s*Math.cos(a)).toFixed(1)+','+(cy+s*Math.sin(a)).toFixed(1)+' ';}return d+'Z';};
  const inUK=(cx,cy)=>{if(cy<90)return cx>85&&cx<170&&(Math.abs(cx-125)+(90-cy)*0.6)<75;if(cy<220){const m=145+Math.sin(cy/30)*15,w=80-Math.abs(cy-160)*0.1;return cx>m-w&&cx<m+w;}if(cy<260){const m=150+Math.sin(cy/20)*5,w=65-(cy-220)*0.7;return cx>m-w&&cx<m+w;}return cx>55&&cx<105&&cy>150&&cy<190;};
  const paths=[];let idx=0;
  for(let r=0;r<18;r++)for(let c=0;c<12;c++){
    const s=10,dx=s*Math.sqrt(3),dy=s*1.5,cx=20+c*dx+(r%2?dx/2:0),cy=15+r*dy;
    if(!inUK(cx,cy)){idx++;continue;}
    let base=0.2+rnd(idx)*0.4;
    const dL=Math.hypot(cx-180,cy-195);if(dL<35)base+=(1-dL/35)*0.45;
    const dB=Math.hypot(cx-155,cy-165);if(dB<28)base+=(1-dB/28)*0.30;
    if(cy<110)base*=0.55;
    paths.push(<path key={idx} d={hp(cx,cy,s-0.8)} fill={ramp(Math.max(0,Math.min(1,base)))} stroke="rgba(255,255,255,0.7)" strokeWidth="0.6" opacity="0.9"/>);
    idx++;
  }
  return <svg viewBox="0 0 280 310" style={{position:'absolute',inset:0,width:'100%',height:'100%',opacity:0.22}}>{paths}</svg>;
}

function RegionPopover({region, setRegion}) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  return (
    <div className="popover-wrap" ref={ref}>
      <button className={'popover-trigger' + (open ? ' open' : '')} onClick={() => setOpen(o => !o)}>
        {region}
        <svg className="chevron" width="10" height="6" viewBox="0 0 10 6" fill="none">
          <path d="M1 1l4 4 4-4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
        </svg>
      </button>
      {open && (
        <div className="popover-menu">
          <div className="popover-group-head">Countries</div>
          {COUNTRIES.map(r => (
            <div key={r} className={'popover-item' + (region === r ? ' active' : '')}
              onClick={() => { setRegion(r); setOpen(false); }}>
              {r}
            </div>
          ))}
          <div className="popover-divider"></div>
          <div className="popover-group-head">English Regions</div>
          {ENG_REGIONS.map(r => (
            <div key={r} className={'popover-item' + (region === r ? ' active' : '')}
              onClick={() => { setRegion(r); setOpen(false); }}>
              {r}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function App() {
  const [scope, setScope] = useState('cr');
  const [poll, setPoll] = useState('pm25');
  const [region, setRegion] = useState('London');

  const pollLabel = POLLS.find(p => p[0] === poll)[1];

  return (
    <div className="card">

      {/* ── Card header ── */}
      <div className="card-head">
        <div>
          <h2>Latest {pollLabel} by {scope === 'uk' ? 'constituency' : 'local authority'}</h2>
          <div className="sub" style={{marginTop:2}}>
            {scope === 'uk' ? '650 UK constituencies' : 'Countries & English regions'} · last 2 hours
          </div>
        </div>
      </div>

      {/* ── Toolbar ── */}
      <div className="toolbar">
        <span className="field-label">View</span>
        <div className="segmented">
          <button className={scope==='uk'?'active':''} onClick={()=>setScope('uk')}>United Kingdom</button>
          <button className={scope==='cr'?'active':''} onClick={()=>setScope('cr')}>Countries &amp; Regions</button>
        </div>

        {/* Region popover — no label, appears only in C&R mode */}
        {scope === 'cr' && (
          <>
            <div className="toolbar-divider"></div>
            <RegionPopover region={region} setRegion={setRegion}/>
          </>
        )}

        <div className="toolbar-divider"></div>
        <span className="field-label">Pollutant</span>
        <div className="pill-group">
          {POLLS.map(([k,l]) => (
            <button key={k} className={'pill'+(poll===k?' active':'')} onClick={()=>setPoll(k)}>{l}</button>
          ))}
        </div>
      </div>

      {/* ── Map body ── */}
      <div className="map-body">
        <div className="map-panel">

          {/* Hex canvas — controls float over it top-right */}
          <div className="hex-canvas">
            <HexBg/>
            <div className="map-topbar">
              <div className="search-pill">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                  <circle cx="5.5" cy="5.5" r="4" stroke="#9aa7b3" strokeWidth="1.4"/>
                  <path d="M9 9l3 3" stroke="#9aa7b3" strokeWidth="1.4" strokeLinecap="round"/>
                </svg>
                <span style={{color:'var(--ink-4)',userSelect:'none'}}>Search</span>
              </div>
              <div className="status-pill">
                <span className="pulse"></span>
                Live
              </div>
              <button className="btn-refresh">Refresh</button>
            </div>
            <span style={{position:'relative',zIndex:1}}>Hex map canvas</span>
          </div>

          {/* Legend */}
          <div className="legend">
            <span style={{color:'var(--ink-4)'}}>PM2.5 (µg/m³)</span>
            <span className="legend-val">0</span>
            <div className="legend-bar"></div>
            <span className="legend-val">50+</span>
            <span style={{color:'var(--ink-4)',fontSize:11}}>power scale 0.8 · Window: 6 Hours</span>
          </div>
        </div>

        {/* Aside */}
        <div className="map-aside">
          <div>
            <div className="aside-label">Networks</div>
            {NETS.map(n => (
              <div key={n.l} className="net-row">
                <input type="checkbox" defaultChecked style={{accentColor:'var(--accent)',flexShrink:0}}/>
                <span className="net-swatch" style={{background:n.c}}></span>
                <span style={{flex:1,fontSize:11}}>{n.l}</span>
                <span className="net-count">{n.n}</span>
              </div>
            ))}
          </div>
          <div style={{borderTop:'1px solid var(--line-soft)',paddingTop:9}}>
            <div className="aside-label">Selected</div>
            <div style={{fontWeight:600,fontSize:12.5,color:'var(--ink-1)'}}>
              {scope==='cr' ? region : 'Bristol West'}
            </div>
            <div style={{fontSize:11,color:'var(--ink-3)',marginTop:2}}>
              {scope==='cr' ? '284 sensors · 5 networks' : '12 sensors · 4 networks'}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:5,marginTop:9}}>
              {[['PM2.5','18.4','#ff9b3a'],['PM10','29.1','#ffd54a'],['NO₂','52','#e03c3c']].map(([k,v,c])=>(
                <div key={k}>
                  <div style={{fontSize:9.5,color:'var(--ink-4)'}}>{k}</div>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:14,color:'var(--ink-1)'}}>{v}</div>
                  <div style={{width:5,height:5,borderRadius:'50%',background:c,marginTop:3}}></div>
                </div>
              ))}
            </div>
            <div style={{fontSize:10.5,color:'var(--ink-3)',marginTop:8}}>Last reading 14:02 BST</div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
